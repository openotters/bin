name: crane
description: "Inspect, copy, list, mutate OCI images. The natural toolchain for any agent that reasons about openotters images themselves."
source: https://github.com/google/go-containerregistry

# Tarball at GitHub releases. OS uses Capitalized form (Darwin/Linux),
# arch uses Rust-style x86_64 instead of amd64. Aliases handle both.
url_template: "https://github.com/google/go-containerregistry/releases/download/{{.Version}}/go-containerregistry_{{.OS}}_{{.Arch}}.tar.gz"
archive: tar.gz
binary_in_archive: crane

os_alias:
  darwin: Darwin
  linux: Linux
arch_alias:
  amd64: x86_64

usage: |
  Read / copy / mutate OCI images from the agent's loop. Standard
  crane subcommands work as-is:

      { "args": ["manifest", "ghcr.io/openotters/runtime:latest"] }

      { "args": ["ls", "ghcr.io/openotters/runtime"] }

      { "args": ["copy", "src.example/image:tag", "dst.example/image:tag"] }

  See https://github.com/google/go-containerregistry/blob/main/cmd/crane/doc/crane.md

versions:
