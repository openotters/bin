name: yaegi
description: "Embedded Go interpreter. Pass Go source via stdin (with args=['run','-']); supports stdlib only, no module fetches, no cgo."
source: https://github.com/traefik/yaegi

url_template: "https://github.com/traefik/yaegi/releases/download/{{.Version}}/yaegi_{{.Version}}_{{.OS}}_{{.Arch}}.tar.gz"
archive: tar.gz
binary_in_archive: yaegi

usage: |
  Run Go source under the embedded yaegi interpreter (a pure-Go
  implementation of the Go language). No compiler, no module cache,
  stdlib only.

  The agent invokes this BIN by sending Go source via the `stdin`
  field, with `args: ["run", "-"]` to tell yaegi to read source from
  stdin. Stdout from the Go program flows back as the tool response.

  Example tool call:

      {
        "args": ["run", "-"],
        "stdin": "package main\nimport \"fmt\"\nfunc main() { fmt.Println(\"hi\") }"
      }

  Source must be a complete Go program (`package main` + `func main()`).
  Stdlib only — no module fetches, no cgo. Each invocation runs in a
  fresh interpreter; nothing persists between calls.

