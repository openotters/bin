name: yq
description: "Query/modify YAML, JSON, TOML, XML, CSV with one tool. Pass the expression as args, the document as stdin."
source: https://github.com/mikefarah/yq

# Raw single binary, named yq_<os>_<arch> on the release page.
url_template: "https://github.com/mikefarah/yq/releases/download/{{.Version}}/yq_{{.OS}}_{{.Arch}}"
archive: raw

usage: |
  Process YAML / JSON / TOML / XML / CSV with mikefarah/yq.

  Pass the expression(s) and any flags as `args`; pipe the source
  document on `stdin`. Equivalent to `yq <args> <stdin>`.

  Examples:

      # Read a value
      { "args": [".name"], "stdin": "name: lyon\ncountry: france" }

      # Convert YAML to JSON
      { "args": ["-o=json"], "stdin": "key: value" }

      # Filter a list
      { "args": [".items[] | select(.age > 30) | .name"], "stdin": "..." }

  Full expression language: https://mikefarah.gitbook.io/yq/

