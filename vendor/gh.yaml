name: gh
description: "GitHub CLI. Read PRs/issues/repos, file new ones, fetch contents. Inherits the agent's GH_TOKEN if set."
source: https://github.com/cli/cli

# Linux is .tar.gz at github.com/cli/cli/releases/download/v2.92.0/gh_2.92.0_linux_amd64.tar.gz
# macOS is .zip at the same release with a different filename suffix.
# Note: the URL path is `vX.Y.Z` but the filename uses bare `X.Y.Z` —
# we strip the leading `v` via the trimPrefix template func.
url_template: "https://github.com/cli/cli/releases/download/{{.Version}}/gh_{{.Version | trimPrefix \"v\"}}_{{.OS}}_{{.Arch}}.tar.gz"
archive: tar.gz
binary_in_archive: "gh_{{.Version | trimPrefix \"v\"}}_{{.OS}}_{{.Arch}}/bin/gh"

usage: |
  GitHub CLI. Read & write GitHub state from the agent loop.

      { "args": ["pr", "list", "--repo", "openotters/openotters"] }
      { "args": ["issue", "view", "42", "--repo", "openotters/openotters"] }
      { "args": ["api", "repos/openotters/openotters/contents/README.md"] }
      { "args": ["pr", "create", "--title", "...", "--body-file", "-"], "stdin": "..." }

  Auth via $GH_TOKEN (inherited from the daemon's env). See
  https://cli.github.com/manual/.

versions:
  - version: "v2.92.0"
    aliases: ["v2.92", "v2"]
    checksums:
      darwin/arm64: b11c54f6bd7d15ed6590475079e5b2fcf36f45d3991a80041b29c9d0cc1f1d07
      darwin/amd64: ae9bb327ab0d91071bdada79f8f14034a2a0f19b0e001835a782eafa519d2af0
      linux/arm64:  c2248526dd0160c08d3fccca2332c3c1a07c15a78b23978e77735f1b5a18cfee
      linux/amd64:  b57848131bdf0c229cd35e1f2a51aa718199858b2e728410b37e89a428943ec4
    platforms:
      # macOS ships .zip, with macOS in the path instead of darwin.
      darwin/arm64:
        url_template: "https://github.com/cli/cli/releases/download/{{.Version}}/gh_{{.Version | trimPrefix \"v\"}}_macOS_{{.Arch}}.zip"
        archive: zip
        binary_in_archive: "gh_{{.Version | trimPrefix \"v\"}}_macOS_{{.Arch}}/bin/gh"
      darwin/amd64:
        url_template: "https://github.com/cli/cli/releases/download/{{.Version}}/gh_{{.Version | trimPrefix \"v\"}}_macOS_{{.Arch}}.zip"
        archive: zip
        binary_in_archive: "gh_{{.Version | trimPrefix \"v\"}}_macOS_{{.Arch}}/bin/gh"
