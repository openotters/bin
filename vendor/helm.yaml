name: helm
description: "Kubernetes package manager. Pass helm subcommands and flags as args; chart values are typically piped via --values - on stdin."
source: https://github.com/helm/helm

# Tarball at get.helm.sh; binary nested under <os>-<arch>/helm so the
# binary_in_archive uses the same OS/Arch template substitution as the URL.
url_template: "https://get.helm.sh/helm-{{.Version}}-{{.OS}}-{{.Arch}}.tar.gz"
archive: tar.gz
binary_in_archive: "{{.OS}}-{{.Arch}}/helm"

usage: |
  Kubernetes package manager. Standard helm invocation:

      { "args": ["list", "-n", "kube-system"] }

      { "args": ["template", "my-release", "./chart"] }

      {
        "args":  ["install", "my-release", "./chart", "--values", "-"],
        "stdin": "image:\n  tag: v1.2.3\nreplicas: 3\n"
      }

  Inherits KUBECONFIG / current-context from the daemon's env.

versions:
