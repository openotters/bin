name: kubectl
description: "Kubernetes CLI. Pass kubectl subcommands and flags as args; --kubeconfig is read from the agent's env. Reads YAML manifests from stdin when args contain '-f -'."
source: https://github.com/kubernetes/kubectl

# Single binary, hosted at dl.k8s.io. OS = linux/darwin, arch = amd64/arm64
# (matches Go conventions exactly — no aliases needed).
url_template: "https://dl.k8s.io/release/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl"
archive: raw

usage: |
  Kubernetes CLI. Standard kubectl invocation:

      { "args": ["get", "pods", "-n", "kube-system"] }

  Read manifests from stdin via `-f -`:

      {
        "args":  ["apply", "-f", "-"],
        "stdin": "apiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: demo\n..."
      }

  Output formatting works as expected:

      { "args": ["get", "deploy", "-o", "yaml"] }
      { "args": ["get", "pods", "-o", "json"] }

  The agent inherits the daemon's KUBECONFIG / current-context — no
  in-band auth.

