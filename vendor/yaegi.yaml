  darwin/amd64: 824946d3205b69e7d1aa790d9ba72cb700af9c0381da7f9334696629445cd5b6
  linux/arm64:  8bdde9618d063b16c7f9f43a7895935c589e741d7428fcabed1e7870dbb28038
  linux/amd64:  396e30227c21172324147a3c603a044a0cc0ed8bbda490fd34831905ff977f96

usage: |
  Run Go source under the embedded yaegi interpreter — a pure-Go
  implementation of the Go language. No compiler, no module cache,
  stdlib only.

  Invocation:

      yaegi run -          # source on stdin
      yaegi run script.go  # source from a file

  Examples:

      $ echo 'package main; import "fmt"; func main() { fmt.Println("hi") }' | yaegi run -
      hi

      $ yaegi run script.go

  Limits: stdlib only (no module fetches, no cgo). Each invocation
  runs in a fresh interpreter — no state persists between calls.
